<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern, accessible, and testable Todo Task Card component."
    />
    <title>Todo Task Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="main-content">
      <h1 class="sr-only">Todo Task Card Demo</h1>

      <div class="page-wrapper">
        <article
          class="todo-card"
          data-testid="test-todo-card"
          aria-labelledby="todo-title"
        >

          <!-- ── Card body ────────────────────────────────── -->
          <div class="card-body">

            <!-- Header: checkbox + title -->
            <header class="card-header">
              <div class="header-top">

                <!-- Checkbox -->
                <div class="checkbox-wrapper">
                  <input
                    type="checkbox"
                    id="todo-complete"
                    class="todo-checkbox"
                    data-testid="test-todo-complete-toggle"
                    aria-label="Mark task as complete"
                  />
                  <label for="todo-complete" class="checkbox-label" aria-hidden="true">
                    <span class="checkmark">
                      <!-- Checkmark icon -->
                      <svg width="11" height="9" viewBox="0 0 11 9" fill="none" aria-hidden="true">
                        <path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                    </span>
                  </label>
                </div>

                <!-- Title -->
                <h2
                  id="todo-title"
                  class="todo-title"
                  data-testid="test-todo-title"
                >
                  Design landing page
                </h2>
              </div>

              <!-- Priority + Status -->
              <div class="meta-row" role="group" aria-label="Task metadata">
                <span
                  class="badge badge--high"
                  data-testid="test-todo-priority"
                  aria-label="Priority: High"
                >
                  <span class="badge-dot" style="background:#f87171" aria-hidden="true"></span>
                  High priority
                </span>

                <span class="meta-sep" aria-hidden="true"></span>

                <span
                  class="badge badge--inprogress"
                  data-testid="test-todo-status"
                  aria-label="Status: In Progress"
                  id="status-badge"
                >
                  <span class="badge-dot" style="background:#60a5fa" aria-hidden="true"></span>
                  In progress
                </span>
              </div>
            </header>

            <!-- Description -->
            <p
              class="todo-description"
              data-testid="test-todo-description"
            >
              Create wireframes and high-fidelity mockups for the product landing page, covering mobile, tablet, and desktop breakpoints. Share with the dev team for hand-off.
            </p>

            <!-- Due date & time remaining -->
            <div
              class="due-section"
              aria-label="Due date information"
            >
              <div class="due-date-row">
                <svg class="due-icon" aria-hidden="true" viewBox="0 0 16 16" fill="none">
                  <rect x="1.5" y="3" width="13" height="11.5" rx="1.75" stroke="currentColor" stroke-width="1.25"/>
                  <path d="M5 1.5V4M11 1.5V4M1.5 6.5H14.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
                </svg>
                <time
                  datetime="2026-03-01T18:00:00Z"
                  class="due-date"
                  data-testid="test-todo-due-date"
                >
                  Mar 1, 2026 · 18:00 UTC
                </time>
              </div>

              <div
                id="time-remaining"
                class="time-remaining"
                data-testid="test-todo-time-remaining"
                aria-live="polite"
                aria-atomic="true"
              >
                <!-- JS fills this -->
              </div>
            </div>

            <!-- Tags -->
            <ul
              class="tags-list"
              role="list"
              data-testid="test-todo-tags"
              aria-label="Task tags"
            >
              <li>
                <span class="tag tag--work" data-testid="test-todo-tag-work">work</span>
              </li>
              <li>
                <span class="tag tag--urgent" data-testid="test-todo-tag-urgent">urgent</span>
              </li>
              <li>
                <span class="tag tag--design">design</span>
              </li>
            </ul>

          </div><!-- /card-body -->

          <!-- ── Card footer ──────────────────────────────── -->
          <footer class="card-footer">
            <button
              type="button"
              class="btn btn--edit"
              data-testid="test-todo-edit-button"
              aria-label="Edit task: Design landing page"
              id="edit-btn"
            >
              <svg class="btn-icon" aria-hidden="true" viewBox="0 0 16 16" fill="none">
                <path d="M11.5 2.5a1.5 1.5 0 012.121 2.121l-7.5 7.5L3 13l.879-3.121 7.621-7.379z" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Edit task
            </button>

            <button
              type="button"
              class="btn btn--delete"
              data-testid="test-todo-delete-button"
              aria-label="Delete task: Design landing page"
              id="delete-btn"
            >
              <svg class="btn-icon" aria-hidden="true" viewBox="0 0 16 16" fill="none">
                <path d="M2 4h12M5.5 4V2.5h5V4M6.5 7v5M9.5 7v5M3 4l.75 9.25a1 1 0 001 .75h6.5a1 1 0 001-.75L13 4" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Delete
            </button>
          </footer>

        </article>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
